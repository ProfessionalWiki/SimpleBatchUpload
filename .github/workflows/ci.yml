name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: "PHPUnit: MW ${{ matrix.mw }}, PHP ${{ matrix.php }}"
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        include:
          - mw: 'REL1_43'
            php: '8.1'
            experimental: false
          - mw: 'REL1_43'
            php: '8.2'
            experimental: false
          - mw: 'REL1_43'
            php: '8.3'
            experimental: false
          - mw: 'REL1_44'
            php: '8.4'
            experimental: false
          - mw: 'REL1_45'
            php: '8.4'
            experimental: false
          - mw: 'REL1_46'
            php: '8.4'
            experimental: true
          - mw: 'master'
            php: '8.5'
            experimental: true

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mediawiki

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          tools: composer

      - name: Cache MediaWiki
        id: cache-mediawiki
        uses: actions/cache@v4
        with:
          path: |
            mediawiki
            !mediawiki/extensions/
            !mediawiki/vendor/
          key: mw_${{ matrix.mw }}-php${{ matrix.php }}_v4

      - name: Cache Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-php${{ matrix.php }}

      - uses: actions/checkout@v4
        with:
            path: EarlyCopy

      - name: Install MediaWiki
        if: steps.cache-mediawiki.outputs.cache-hit != 'true'
        working-directory: ~
        run: bash EarlyCopy/.github/workflows/installMediaWiki.sh ${{ matrix.mw }} SimpleBatchUpload

      - uses: actions/checkout@v4
        with:
          path: mediawiki/extensions/SimpleBatchUpload

      - run: composer update

      - name: Run update.php
        run: php maintenance/update.php --quick

      - name: Run PHPUnit
        run: |
          if [ -f tests/phpunit/phpunit.php ]; then
            php tests/phpunit/phpunit.php -c extensions/SimpleBatchUpload/
          else
            # MW 1.46 and later
            if [ ! -f phpunit.xml.template ]; then
              wget -q -O phpunit.xml.template "https://raw.githubusercontent.com/wikimedia/mediawiki/${{ matrix.mw }}/phpunit.xml.template"
            fi
            composer phpunit:config
            MEDIAWIKI_HAS_INTEGRATION_TESTS=1 vendor/bin/phpunit -c phpunit.xml extensions/SimpleBatchUpload/tests/phpunit
          fi

      - name: Run PHPUnit with code coverage
        run: |
          if [ -f tests/phpunit/phpunit.php ]; then
            php tests/phpunit/phpunit.php -c extensions/SimpleBatchUpload/ --coverage-clover coverage.xml
          else
            # MW 1.46 and later
            if [ ! -f phpunit.xml.template ]; then
              wget -q -O phpunit.xml.template "https://raw.githubusercontent.com/wikimedia/mediawiki/${{ matrix.mw }}/phpunit.xml.template"
            fi
            composer phpunit:config
            MEDIAWIKI_HAS_INTEGRATION_TESTS=1 vendor/bin/phpunit -c phpunit.xml extensions/SimpleBatchUpload/tests/phpunit --coverage-clover coverage.xml
          fi

      - name: Upload code coverage
        run: bash <(curl -s https://codecov.io/bash)
        if: github.ref == 'refs/heads/master'
